name: Claude AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-review:
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.pull_request.user.login == 'zbrooks442' ||
       github.event.pull_request.user.login == 'zb02930139')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          prompt: >
            Review this pull request for code quality, correctness, and security.
            Analyze the diff, then post your findings as review comments.
          claude_args: "--max-turns 5"

  claude-respond:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      github.event.sender.login != 'zb02930139' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
